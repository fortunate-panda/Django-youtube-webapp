{% extends 'videos/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-sm mb-4">
            <video width="100%" controls class="rounded-top" autoplay>
                <source src="{{ video.video_file.url }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="card-body">
                <h3 class="card-title">{{ video.title }}</h3>
                <p class="text-muted small border-bottom pb-2">Uploaded on {{ video.uploaded_at|date:"F j, Y" }}</p>
                <p class="card-text mt-3">{{ video.description|linebreaks }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
